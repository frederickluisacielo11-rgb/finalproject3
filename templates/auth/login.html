<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Electron Shock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#1e3a5f', light: '#2a5298', dark: '#122540' },
            accent:  { DEFAULT: '#e8a020', light: '#f5b942', dark: '#c4861a' },
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif'] },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-dark via-primary to-primary-light flex items-center justify-center p-4 font-sans">

  <div class="w-full max-w-md">

    <!-- Logo Card -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-accent shadow-lg mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Electron Shock</h1>
      <p class="text-blue-200 text-sm mt-1">Inventory Management System</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-bold text-gray-800 mb-1">Welcome back</h2>
      <p class="text-gray-500 text-sm mb-6">Sign in to your account to continue</p>

      {% if form.errors %}
      <div class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-5">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Invalid username or password. Please try again.
      </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
          <input type="text" name="username" autocomplete="username" required
            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary transition"
            placeholder="Enter your username"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
          <input type="password" name="password" autocomplete="current-password" required
            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary transition"
            placeholder="Enter your password"/>
        </div>
        <input type="hidden" name="next" value="{{ next }}"/>
        <button type="submit"
          class="w-full py-2.5 bg-accent hover:bg-amber-600 text-white font-semibold rounded-lg text-sm transition-colors duration-200 shadow-sm">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-blue-200 text-xs mt-6">&copy; 2026 Electron Shock. All rights reserved.</p>
  </div>

</body>
</html>
